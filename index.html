<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Overthinker Diaries</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Kalam:wght@300;400;700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { 
    width: 100%; height: 100%; overflow: hidden; 
    cursor: none; background-color: #C8A96E; 
    user-select: none; -webkit-user-select: none; 
    overscroll-behavior: none; touch-action: none;
}

#game-container { 
    width: 100vw; height: 100vh; position: relative; 
    font-family: 'Kalam', cursive; overflow: hidden; 
}

#canvas-holder { 
    position: absolute; top: 42px; left: 0; width: 100%; height: calc(100% - 42px); 
    z-index: 10; pointer-events: none; 
}

.kraft-bg { 
    position: absolute; inset: 0; z-index: 1; 
    background-color: #C8A96E;
    background-image: 
        radial-gradient(ellipse at center, transparent 40%, rgba(90, 50, 20, 0.6) 100%),
        repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.05) 2px, rgba(255,255,255,0.05) 4px),
        repeating-linear-gradient(-45deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
}

.lined-paper { background-image: repeating-linear-gradient(to bottom, transparent, transparent 27px, rgba(139, 100, 50, 0.25) 28px); background-position: 0 40px; }
.margin-line::after { content: ''; position: absolute; left: 48px; top: 0; bottom: 0; width: 1.5px; background: rgba(180, 60, 40, 0.35); z-index: 2; pointer-events: none; }

.fn-hud { 
    position: absolute; top: 0; left: 0; right: 0; z-index: 100; height: 42px; padding: 0 16px; 
    background: rgba(170,130,60,0.85); border-bottom: 1.5px solid rgba(100,60,20,0.4); 
    display: none; align-items: center; gap: 15px; font-family: 'Special Elite', monospace; font-size: 13px; color: #1a1008; 
}
#hud-hearts { font-size: 15px; letter-spacing: 2px; min-width: 90px; color: #8b1a1a; font-weight: bold; }
.fn-progress-track { flex: 1; height: 6px; background: rgba(0,0,0,0.1); border-radius: 3px; overflow: hidden; }
#hud-progress { height: 100%; background: #1a3a1a; width: 100%; transition: width 0.3s; }

.screen { 
    display: none; width: 100%; height: 100%; position: absolute; inset: 0; 
    overflow: hidden; z-index: 500; flex-direction: column; align-items: center; justify-content: center; 
    pointer-events: all; 
}
.screen.active { display: flex; }

.bg-stripes {
    position: absolute; top: 50%; left: 0; width: 100%; transform: translateY(-50%); 
    display: flex; flex-direction: column; gap: 15px; z-index: 0; 
}
.stripe-1, .stripe-3 { height: 18px; background-color: #1a1008; } 
.stripe-2 { height: 120px; background-color: #1a1008; }

.start-card {
    border: 3px solid #1a1008; border-radius: 40px; padding: 60px 40px; text-align: center;
    display: flex; flex-direction: column; align-items: center; max-width: 700px; width: 90%; 
    background: #C8A96E; position: relative; z-index: 1; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}
.fn-cover-stamp { font-family: 'Special Elite', monospace; font-size: 70px; font-weight: 900; color: #1a1008; line-height: 0.9; text-transform: uppercase;}
.underline-rule { height: 3px; background: #1a1008; margin: 15px 0 35px; width: 100%; max-width: 380px; }
.fn-handwriting { font-family: 'Kalam', cursive; font-size: 20px; color: #1c1c40; max-width: 550px; margin-bottom: 35px; line-height: 1.6; }

button { 
    font-family: 'Kalam', cursive; padding: 12px 35px; background: #1a1008; color: #C8A96E; 
    border: 2px solid #1a1008; border-radius: 5px; font-size: 18px; cursor: none; 
    position: relative; z-index: 600; pointer-events: all; transition: all 0.15s ease;
}
button * { pointer-events: none; }
button:hover { background: #2a1a0c; transform: scale(1.03); }
button:active { transform: scale(0.95); }

button.btn-outline { background: transparent; color: #1a1008; border: 2px solid #1a1008; }
button.btn-outline:hover { background: rgba(26, 16, 8, 0.1); }

#cursor-dot { 
    position: fixed; width: 16px; height: 16px; border: 2px solid #1c1c5a; border-radius: 50%; 
    pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: opacity 0.1s; 
}

#pause-screen { z-index: 700; background: rgba(100, 70, 30, 0.8); cursor: none; }
#over-screen { background: rgba(107, 42, 26, 0.95); color: #D4B483; }
#over-screen button.btn-outline { color: #D4B483; border-color: #D4B483; }
#over-screen button.btn-outline:hover { background: rgba(212, 180, 131, 0.1); }
#win-screen { background: rgba(42, 74, 42, 0.95); color: #B8D490; }
.end-title { font-family: 'Special Elite', monospace; font-size: 52px; margin-bottom: 10px; text-align: center; }

/* =========================================
   RESPONSIVITAS MOBILE (HP) 
   ========================================= */
@media (max-width: 600px) {
    /* Padding diperkecil agar lega, border-radius disesuaikan */
    .start-card { padding: 40px 15px; border-radius: 30px; width: 95%; }
    
    /* UKURAN JUDUL DIPERKECIL MENJADI 34px (Sebelumnya 42px) */
    .fn-cover-stamp { font-size: 34px; }
    
    .fn-handwriting { font-size: 16px; margin-bottom: 25px; }
    button { font-size: 16px; padding: 10px 25px; cursor: default; }
    .stripe-2 { height: 90px; }
    
    .fn-hud { gap: 8px; font-size: 10px; padding: 0 8px; }
    #hud-hearts { font-size: 12px; min-width: 75px; letter-spacing: -1px; }
    #pause-btn { font-size: 10px; padding: 4px 8px; }

    .end-title { font-size: 38px; }
    #over-screen p, #win-screen p { font-size: 18px; }
}
</style>
</head>
<body>

<div id="cursor-dot"></div>

<div id="game-container" class="kraft-bg lined-paper margin-line">
    
    <div class="fn-hud">
        <span id="hud-hearts">FOKUS: ♥ ♥ ♥</span>
        <div class="fn-progress-track"><div id="hud-progress"></div></div>
        <span id="hud-score">avoided: 0</span>
        <button id="pause-btn" style="font-family: 'Special Elite', monospace;">|| PAUSE</button>
    </div>

    <div id="canvas-holder"></div>

    <div id="start-screen" class="screen active">
        <div class="bg-stripes">
            <div class="stripe-1"></div>
            <div class="stripe-2"></div>
            <div class="stripe-3"></div>
        </div>

        <div class="start-card">
            <div class="fn-cover-stamp">OVERTHINKER<br>DIARIES</div>
            <div class="underline-rule"></div>
            <div class="fn-handwriting">
                "Aku tahu susah, tapi sebisa mungkin jangan menyerah."<br><br>
                Gunakan kursor/sentuhan untuk menghindari kata merah.
            </div>
            <button id="start-btn-action">Mulai Tulis</button>
        </div>
    </div>

    <div id="pause-screen" class="screen">
        <div style="background: #D4B483; border: 3px solid #1a1008; padding: 30px; text-align: center; max-width: 85%; border-radius: 10px; pointer-events: all; box-shadow: 5px 5px 15px rgba(0,0,0,0.3);">
            <p id="pause-quote" style="font-family: 'Kalam', cursive; font-size: 18px; font-style: italic; margin-bottom: 20px; color: #1a1008;"></p>
            <p style="font-family: 'Special Elite'; font-size: 11px; color: #5a3a10; margin-bottom: 25px;">— SENTUH UNTUK MELANJUTKAN —</p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button id="resume-btn">Lanjut</button>
                <button id="menu-btn-pause" class="btn-outline">Menu</button>
            </div>
        </div>
    </div>

    <div id="over-screen" class="screen">
        <h1 class="end-title">HALAMAN PENUH</h1>
        <p style="margin: 10px 0 30px;">Pikiran terlalu bising.</p>
        <div style="display: flex; gap: 15px; justify-content: center;">
            <button id="retry-btn">Coba Lagi</button>
            <button id="menu-btn-over" class="btn-outline">Menu</button>
        </div>
    </div>

    <div id="win-screen" class="screen">
        <h1 class="end-title">HALAMAN BERSIH</h1>
        <p style="margin: 10px 0 30px;">Kamu berhasil menjaga kejernihan.</p>
        <button id="win-btn">Tulis Baru</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="sketch.js"></script>
</body>
</html>
